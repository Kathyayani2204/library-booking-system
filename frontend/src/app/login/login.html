<div class="login-container">

  <h2>Login</h2>

  <form (ngSubmit)="login()">

    <label for="email">Email</label>

    <input
      id="email"
      type="email"
      name="email"
      [(ngModel)]="email"
      placeholder="Enter your email"
      required
    >

    <label for="password">Password</label>

    <input
      id="password"
      type="password"
      name="password"
      [(ngModel)]="password"
      placeholder="Enter your password"
      required
    >

    <button type="submit">
      Login
    </button>

  </form>

  <div
    *ngIf="message"
    class="message-success"
  >
    {{ message }}
  </div>

  <div
    *ngIf="errorMessage"
    class="message-error"
  >
    {{ errorMessage }}
  </div>

</div>
