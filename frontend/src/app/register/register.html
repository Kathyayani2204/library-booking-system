<div class="register-container">

  <h2>Create Account</h2>

  <form (ngSubmit)="register()">

    <div>
      <label>Name</label>
      <input
        type="text"
        name="name"
        [(ngModel)]="name"
        required
      >
    </div>

    <div>
      <label>Email</label>
      <input
        type="email"
        name="email"
        [(ngModel)]="email"
        required
      >
    </div>

    <div>
      <label>Password</label>
      <input
        type="password"
        name="password"
        [(ngModel)]="password"
        required
      >
    </div>

    <button type="submit">
      Register
    </button>

  </form>

  <p *ngIf="message">
    {{ message }}
  </p>

  <p *ngIf="errorMessage">
    {{ errorMessage }}
  </p>

</div>
